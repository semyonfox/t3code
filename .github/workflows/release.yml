name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { label: "macOS arm64", runner: macos-latest,  platform: mac,   target: dmg,      arch: arm64 }
          - { label: "macOS x64",   runner: macos-13,      platform: mac,   target: dmg,      arch: x64   }
          - { label: "Linux x64",   runner: ubuntu-24.04,  platform: linux, target: AppImage, arch: x64   }
          - { label: "Windows x64", runner: windows-latest, platform: win,  target: nsis,     arch: x64   }
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: bun install --frozen-lockfile
      - id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - run: node scripts/update-release-package-versions.ts "${{ steps.ver.outputs.version }}"
      - name: Build
        shell: bash
        run: |
          bun run dist:desktop:artifact -- \
            --platform "${{ matrix.platform }}" \
            --target "${{ matrix.target }}" \
            --arch "${{ matrix.arch }}" \
            --build-version "${{ steps.ver.outputs.version }}" \
            --verbose
      - name: Collect assets
        shell: bash
        run: |
          mkdir -p release-publish
          shopt -s nullglob
          for f in release/*.dmg release/*.zip release/*.AppImage release/*.exe release/*.blockmap release/*.yml; do
            cp "$f" release-publish/
          done
          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            for m in release-publish/*-mac.yml; do mv "$m" "${m%.yml}-x64.yml"; done
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-publish/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - uses: actions/setup-node@v6
        with:
          node-version-file: package.json
      - run: bun install --frozen-lockfile --filter=@t3tools/scripts
      - uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: release-assets
      - name: Merge macOS manifests
        shell: bash
        run: |
          shopt -s nullglob
          for x64 in release-assets/*-mac-x64.yml; do
            arm64="${x64%-x64.yml}.yml"
            [[ -f "$arm64" ]] && node scripts/merge-update-manifests.ts --platform mac "$arm64" "$x64" && rm -f "$x64"
          done
      - uses: softprops/action-gh-release@v2
        with:
          name: "T3 Code (math) ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.AppImage
            release-assets/*.exe
            release-assets/*.blockmap
            release-assets/*.yml
          token: ${{ secrets.GITHUB_TOKEN }}
